<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherApp</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-wrap">
        <main>
            <section class="location">
                <div class="city">Tashkent, Uzbekistan</div>
                <div class="date">Saturday 24 August 2020</div>
            </section>
            <div class="current">
                <div class="temp">18 <span>°C</span></div>
                <div class="weather">Fog</div>
                <div class="hi-low">17°C / 19°C</div>
            </div>
        </main>
        <header>
            <input class="search-box" type="text" autocapitalize="off" placeholder="Search...">
        </header>
    </div>
    <script src="app.js"></script>
</body>
</html>
